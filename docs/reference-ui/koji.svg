<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="kojiStalk" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7e3da8"/>
